<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CGRC Trainer">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>CGRC Trainer</title>
</head>
<body>

<div id="app">
  <!-- Splash -->
  <div id="splash">
    <div class="splash-icon">CGRC</div>
    <div class="splash-title">CGRC Trainer</div>
    <div class="splash-sub">ISC2 Exam Prep</div>
  </div>

  <!-- Main view (swapped by app.js) -->
  <main id="view">
    <div class="loading">Loading…</div>
  </main>

  <!-- Tab bar -->
  <nav id="tabbar">
    <button class="tab-btn active" data-tab="quiz">
      <span class="tab-icon">📝</span>
      <span>Quiz</span>
    </button>
    <button class="tab-btn" data-tab="flashcards">
      <span class="tab-icon">🃏</span>
      <span>Cards</span>
    </button>
    <button class="tab-btn" data-tab="concepts">
      <span class="tab-icon">📖</span>
      <span>Concepts</span>
    </button>
    <button class="tab-btn" data-tab="progress">
      <span class="tab-icon">📊</span>
      <span>Progress</span>
    </button>
  </nav>
</div>

<script src="app.js"></script>
</body>
</html>
